<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Rentgen — Investičný screening pre slovenské firmy. Finančné dáta 100 000+ firiem, filtre, export, 5-ročná história.">
<meta name="theme-color" content="#c8ff3e">
<meta property="og:title" content="Rentgen — Presvieť si firmu">
<meta property="og:description" content="Nájdi akvizičný cieľ za sekundy. Finančné dáta 100 000+ slovenských firiem.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23c8ff3e'/><circle cx='16' cy='16' r='8' fill='none' stroke='%23060708' stroke-width='3'/><line x1='16' y1='8' x2='16' y2='24' stroke='%23060708' stroke-width='3'/></svg>">
<title>Rentgen — Presvieť si firmu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,800&family=Geist+Mono:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060708;--s1:#0c0d10;--s2:#111316;--s3:#181b1f;--s4:#1f2328;
  --tx:#eeeee9;--t2:#94979f;--t3:#55585f;--t4:#33363c;
  --ac:#c8ff3e;--acd:rgba(200,255,62,.07);--acg:rgba(200,255,62,.025);
  --w:#ffffff;--coral:#ff5c46;--blue:#5b8aff;
  --sans:'Bricolage Grotesque',sans-serif;
  --serif:'Newsreader',serif;
  --mono:'Geist Mono',monospace;
}
html{background:var(--bg);scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--ac);color:var(--bg)}
a{text-decoration:none;color:inherit}
input::placeholder,textarea::placeholder{color:var(--t3)}

/* KEYFRAMES */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes grow{from{width:0}to{width:var(--w)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(200,255,62,.1)}50%{box-shadow:0 0 40px rgba(200,255,62,.25),0 0 80px rgba(200,255,62,.08)}}
@keyframes borderGlow{0%,100%{border-color:rgba(200,255,62,.15)}50%{border-color:rgba(200,255,62,.4)}}
@keyframes scrollHint{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(6px)}}

/* ══════ NAV ══════ */
.nv{position:fixed;top:0;left:0;right:0;z-index:999;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(6,7,8,.9);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid rgba(255,255,255,.04)}
.nv-l{display:flex;align-items:center;gap:7px;cursor:pointer}
.nv-dot{width:18px;height:18px;background:var(--ac);border-radius:4px;display:grid;place-items:center;transition:transform .2s}
.nv-l:hover .nv-dot{transform:rotate(90deg)}
.nv-dot svg{width:10px;height:10px}
.nv-n{font-family:var(--mono);font-weight:600;font-size:13.5px;letter-spacing:-.03em;color:var(--tx)}
.nv-c{display:flex;gap:2px}
.nv-c button{background:none;border:none;color:var(--t2);font-family:var(--sans);font-size:12px;font-weight:400;padding:5px 13px;border-radius:5px;cursor:pointer;transition:all .12s}
.nv-c button:hover{color:var(--tx);background:rgba(255,255,255,.04)}
.nv-c button.on{color:var(--ac)}
.nv-r{display:flex;align-items:center;gap:8px}
.nv-lang{font-family:var(--mono);font-size:10.5px;padding:4px 8px;border:1px solid var(--t4);border-radius:4px;color:var(--t3);cursor:pointer;background:none;transition:all .15s;letter-spacing:.06em}
.nv-lang:hover{color:var(--t2);border-color:var(--t3)}
.nv-cta{background:var(--ac);color:var(--bg);font-family:var(--sans);font-size:11.5px;font-weight:600;padding:6px 16px;border-radius:5px;border:none;cursor:pointer;transition:all .15s}
.nv-cta:hover{box-shadow:0 0 20px rgba(200,255,62,.2);transform:translateY(-1px)}
.nv-ham{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:4px}
.nv-ham span{display:block;width:18px;height:1.5px;background:var(--t2);border-radius:1px;transition:all .2s}
.nv-mob{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;background:rgba(6,7,8,.97);backdrop-filter:blur(20px);z-index:998;padding:40px;flex-direction:column;gap:4px}
.nv-mob.open{display:flex}
.nv-mob button{background:none;border:none;color:var(--t2);font-family:var(--sans);font-size:18px;font-weight:400;padding:16px 0;cursor:pointer;text-align:left;border-bottom:1px solid rgba(255,255,255,.04);transition:color .12s}
.nv-mob button:hover,.nv-mob button.on{color:var(--ac)}

/* ══════ LAYOUT ══════ */
.mx{max-width:1100px;margin:0 auto;padding:0 40px}
.page{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}

/* ══════ HERO ══════ */
.hero{padding:130px 0 0;min-height:100vh;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-20%;right:-15%;width:700px;height:700px;background:radial-gradient(circle,var(--acg) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none;z-index:2}
.hero-grain{position:absolute;inset:0;opacity:.03;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;opacity:.5;transition:opacity .2s}
.hero-scroll:hover{opacity:.8}
.hero-scroll-text{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.15em;text-transform:uppercase}
.hero-scroll-arrow{width:16px;height:16px;border-right:1.5px solid var(--t3);border-bottom:1.5px solid var(--t3);transform:rotate(45deg);animation:scrollHint 2s ease infinite}

/* Scroll reveal for sections */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;position:relative;z-index:1}
.hero-left{padding-top:40px}
.hero-badge{display:inline-flex;align-items:center;gap:7px;margin-bottom:40px;animation:fadeUp .5s .1s both}
.hero-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease infinite}
.hero-badge-text{font-family:var(--mono);font-size:10.5px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase}
.hero h1{font-size:clamp(42px,5.8vw,76px);font-weight:800;line-height:.95;letter-spacing:-.05em;margin-bottom:28px;animation:fadeUp .5s .2s both}
.hero h1 i{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--ac)}
.hero-sub{font-size:15.5px;color:var(--t2);line-height:1.8;max-width:400px;margin-bottom:44px;font-weight:300;animation:fadeUp .5s .3s both}
.hero-acts{display:flex;gap:10px;animation:fadeUp .5s .4s both}
.btn-ac{background:var(--ac);color:var(--bg);padding:13px 28px;border-radius:7px;font-weight:600;font-size:13.5px;border:none;cursor:pointer;font-family:var(--sans);transition:all .2s;position:relative;overflow:hidden}
.btn-ac::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transition:none}
.btn-ac:hover{box-shadow:0 8px 32px rgba(200,255,62,.18);transform:translateY(-2px)}
.btn-ac:hover::after{animation:shimmer .6s ease forwards}
.btn-gh{background:none;border:1px solid var(--t4);color:var(--t2);padding:13px 22px;border-radius:7px;font-size:13.5px;font-weight:400;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-gh:hover{border-color:var(--t3);color:var(--tx)}

/* HERO RIGHT — screener card */
.hero-right{animation:fadeUp .6s .35s both}
.scr{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:borderGlow 4s ease infinite;transition:transform .3s,box-shadow .3s}
.scr:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 32px 100px rgba(0,0,0,.6),0 0 40px rgba(200,255,62,.06)}
.scr-head{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center}
.scr-dots{display:flex;gap:5px}
.scr-dots span{width:8px;height:8px;border-radius:50%;background:var(--s3)}
.scr-dots span:nth-child(1){background:#ff5c46}
.scr-dots span:nth-child(2){background:#ffbd2e}
.scr-dots span:nth-child(3){background:#27c93f}
.scr-label{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.scr-filters{padding:12px 18px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.03)}
.scr-f{font-family:var(--mono);font-size:10px;color:var(--t2);background:var(--s2);border:1px solid rgba(255,255,255,.05);padding:4px 9px;border-radius:4px}
.scr-body{padding:4px 0}
.scr-row{display:grid;grid-template-columns:1.6fr .8fr .5fr .5fr;padding:9px 18px;font-size:12px;transition:background .1s;cursor:default;align-items:center}
.scr-row:hover{background:rgba(255,255,255,.02)}
.scr-row.head{color:var(--t3);font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px}
.scr-row .nm{color:var(--tx);font-weight:500;font-size:12.5px}
.scr-row .mn{font-family:var(--mono);font-size:11.5px;color:var(--t2)}
.scr-row .up{font-family:var(--mono);font-size:11.5px;color:var(--ac);font-weight:500}
.scr-row .g-bar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden}
.scr-row .g-bar div{height:100%;background:var(--ac);border-radius:1px}
.scr-foot{padding:10px 18px;border-top:1px solid rgba(255,255,255,.03);font-family:var(--mono);font-size:9.5px;color:var(--t3);display:flex;justify-content:space-between}

/* METRICS STRIP */
.mstrip{border-top:1px solid rgba(255,255,255,.04);padding:56px 0;position:relative;z-index:3;background:var(--bg)}
.mstrip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.mstrip-item{text-align:center;padding:0 20px;border-right:1px solid rgba(255,255,255,.04)}
.mstrip-item:last-child{border:none}
.mstrip-v{font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-.04em;color:var(--tx);margin-bottom:4px}
.mstrip-l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}

/* ══════ TICKER ══════ */
.tick{border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);padding:11px 0;overflow:hidden;background:var(--s1)}
.tick-in{display:flex;gap:40px;animation:marquee 35s linear infinite;white-space:nowrap;width:max-content}
.tick-i{font-family:var(--mono);font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.tick-i .dot{width:3px;height:3px;border-radius:50%;background:var(--t4)}

/* ══════ SECTIONS ══════ */
.sec{padding:100px 0}
.sl{font-family:var(--mono);font-size:10px;color:var(--ac);text-transform:uppercase;letter-spacing:.16em;margin-bottom:20px}
.stt{font-size:clamp(26px,3.5vw,42px);font-weight:800;line-height:1.08;letter-spacing:-.04em;max-width:560px}
.stt i{font-family:var(--serif);font-style:italic;font-weight:400}
.sde{font-size:14.5px;color:var(--t2);line-height:1.75;margin-top:14px;max-width:440px;font-weight:300}

/* ══════ STEPS ══════ */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:56px;border:1px solid rgba(255,255,255,.05);border-radius:12px;overflow:hidden}
.stp{padding:40px 30px;background:var(--s1);border-right:1px solid rgba(255,255,255,.04);position:relative;transition:background .25s}
.stp:last-child{border:none}
.stp:hover{background:var(--s2)}
.stp-n{font-family:var(--mono);font-size:9px;color:var(--ac);letter-spacing:.18em;text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:8px}
.stp-n::after{content:'';flex:1;height:1px;background:rgba(200,255,62,.15)}
.stp h3{font-size:16.5px;font-weight:600;margin-bottom:10px;letter-spacing:-.02em;line-height:1.2}
.stp p{font-size:13px;color:var(--t2);line-height:1.65}

/* ══════ FEATURES ══════ */
.fsec{background:var(--s1);border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04)}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:48px}
.fc{background:var(--bg);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:28px 24px;transition:all .2s}
.fc:hover{border-color:rgba(255,255,255,.08);transform:translateY(-2px)}
.fc h3{font-size:14px;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
.fc p{font-size:12.5px;color:var(--t2);line-height:1.6}
.fc.dim{opacity:.45}.fc.dim:hover{opacity:.65}
.fc .cs{display:inline-block;margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--coral);background:rgba(255,92,70,.08);padding:2px 7px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase}

/* ══════ USE CASES ══════ */
.ucg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.uc{border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:32px 24px;background:var(--s1);transition:border-color .2s}
.uc:hover{border-color:rgba(255,255,255,.08)}
.uc-who{font-family:var(--mono);font-size:9.5px;color:var(--ac);text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px}
.uc q{display:block;font-family:var(--serif);font-size:16.5px;font-style:italic;font-weight:400;line-height:1.4;margin-bottom:14px;color:var(--tx);quotes:none}
.uc p{font-size:12.5px;color:var(--t2);line-height:1.65}

/* ══════ COMPARISON ══════ */
.ctb{width:100%;border-collapse:collapse;margin-top:48px}
.ctb th{text-align:left;padding:12px 18px;font-size:12.5px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.06)}
.ctb th:nth-child(2){color:var(--ac)}
.ctb td{padding:11px 18px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t2)}
.ctb td:first-child{color:var(--tx);font-weight:500}
.ctb tr:hover td{background:rgba(255,255,255,.015)}
.ctb .y{color:var(--ac);font-weight:600}.ctb .n{color:var(--t4)}

/* ══════ DATA MODEL ══════ */
.dmg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:48px}
.dmc{background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:24px 20px}
.dmc-l{font-family:var(--mono);font-size:9.5px;color:var(--ac);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.dmc div+div{font-size:12.5px;color:var(--t2);padding:3px 0;line-height:1.5}

/* ══════ PRICING ══════ */
.prg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:48px}
.pr{background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:36px 28px;display:flex;flex-direction:column;position:relative;transition:all .2s}
.pr:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.06)}
.pr.hi{border-color:var(--ac);background:linear-gradient(var(--s1),var(--s1)) padding-box,linear-gradient(135deg,var(--ac),rgba(200,255,62,.3),var(--ac)) border-box;border:1.5px solid transparent}
.pr.hi:hover{box-shadow:0 0 40px rgba(200,255,62,.08),0 8px 32px rgba(0,0,0,.3)}
.pr-pop{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--ac);color:var(--bg);font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 12px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.pr-ti{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);margin-bottom:14px}
.pr-pr{font-size:36px;font-weight:800;letter-spacing:-.04em;margin-bottom:3px}
.pr-pr span{font-size:13px;font-weight:400;color:var(--t3)}
.pr-de{font-size:12.5px;color:var(--t2);margin-bottom:24px;line-height:1.5}
.pr-ff{flex-grow:1}
.pr-ff div{display:flex;align-items:baseline;gap:8px;padding:5px 0;font-size:12.5px;color:var(--t2)}
.pr-ff div::before{content:'\2713';color:var(--ac);font-weight:600;font-size:11px;flex-shrink:0}
.pr-bt{margin-top:24px;width:100%;padding:12px;border-radius:7px;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.pr-bt.f{background:var(--ac);color:var(--bg);border:none}
.pr-bt.f:hover{box-shadow:0 4px 20px rgba(200,255,62,.15)}
.pr-bt.o{background:none;border:1px solid var(--t4);color:var(--tx)}
.pr-bt.o:hover{border-color:var(--t3)}

/* ══════ FAQ ══════ */
.faq{margin-top:48px;max-width:600px}
.faq-i{border-bottom:1px solid rgba(255,255,255,.04);padding:0;overflow:hidden}
.faq-i h3{font-size:14.5px;font-weight:600;letter-spacing:-.01em;padding:20px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:color .15s}
.faq-i h3:hover{color:var(--ac)}
.faq-i h3::after{content:'+';font-family:var(--mono);font-size:16px;color:var(--t3);transition:transform .25s,color .15s}
.faq-i.open h3::after{transform:rotate(45deg);color:var(--ac)}
.faq-i p{font-size:13px;color:var(--t2);line-height:1.7;max-height:0;overflow:hidden;padding:0;transition:max-height .35s ease,padding .35s ease,opacity .25s;opacity:0}
.faq-i.open p{max-height:200px;padding:0 0 20px;opacity:1}

/* ══════ ABOUT ══════ */
.abg{display:grid;grid-template-columns:1fr 360px;gap:56px;margin-top:48px}
.abg p{font-size:14.5px;color:var(--t2);line-height:1.8;margin-bottom:16px}
.pipe{background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:28px 24px;height:fit-content}
.pipe-l{font-family:var(--mono);font-size:9.5px;color:var(--ac);text-transform:uppercase;letter-spacing:.12em;margin-bottom:18px}
.pipe-r{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12.5px}
.pipe-r:last-child{border:none}
.pipe-r .k{color:var(--t3);font-weight:500}.pipe-r .v{color:var(--t2)}
.road{margin-top:48px;max-width:560px}
.road-i{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.road-d{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.road-i h3{font-size:14.5px;font-weight:600;margin-bottom:4px}
.road-i p{font-size:12.5px;color:var(--t2);line-height:1.6}
.vtag{display:inline-block;font-family:var(--mono);font-size:8.5px;padding:2px 6px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;margin-left:6px;vertical-align:middle}

/* ══════ CONTACT ══════ */
.kong{display:grid;grid-template-columns:1fr 1fr;gap:72px;margin-top:48px}
.kon-inf div{margin-bottom:20px}
.kon-inf .kl{font-family:var(--mono);font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.kon-inf .kv{font-size:14.5px}
.kon-fm{background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:32px 28px}
.kon-fm label{display:block;font-family:var(--mono);font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.kon-fm input,.kon-fm textarea{width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(--t4);background:var(--bg);color:var(--tx);font-size:13.5px;font-family:var(--sans);outline:none;transition:border-color .12s;margin-bottom:16px}
.kon-fm input:focus,.kon-fm textarea:focus{border-color:var(--ac)}
.kon-sent{text-align:center;padding:56px 24px}

/* ══════ CTA BAND ══════ */
.ctab{border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);background:var(--s1);padding:80px 0;text-align:center}

/* ══════ FOOTER ══════ */
.ft{padding:48px 0 36px;border-top:1px solid rgba(255,255,255,.04);background:var(--s1)}
.ftg{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:36px;margin-bottom:36px}
.ftc h4{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:12px}
.ftc a,.ftc span{display:block;font-size:12.5px;color:var(--t2);padding:3px 0;transition:color .12s}
.ftc a:hover{color:var(--tx)}
.ftb{border-top:1px solid rgba(255,255,255,.03);padding-top:18px;display:flex;justify-content:space-between;font-size:11px;color:var(--t3);font-family:var(--mono)}

/* ══════ RESPONSIVE ══════ */
@media(max-width:900px){
  .mx{padding:0 20px}.nv{padding:0 16px}.nv-c{display:none}
  .nv-ham{display:flex}
  .hero-grid,.abg,.kong{grid-template-columns:1fr!important}
  .hero-right{margin-top:32px}
  .steps,.fgrid,.ucg,.prg,.dmg,.mstrip-grid{grid-template-columns:1fr}
  .ftg{grid-template-columns:1fr 1fr}
  .ftb{flex-direction:column;gap:6px;text-align:center}
  .sec{padding:72px 0}.hero{min-height:auto;padding-bottom:40px}
  .stp{border-right:none;border-bottom:1px solid rgba(255,255,255,.04)}
  .stp:last-child{border:none}
  .mstrip-item{padding:16px 0;border-right:none;border-bottom:1px solid rgba(255,255,255,.04)}
  .mstrip-item:last-child{border:none}
  .hero-scroll{display:none}
  .rg{padding:1rem 0!important}
}
@media(max-width:600px){.ftg{grid-template-columns:1fr}.hero h1{font-size:38px}}

function fmt(v){if(v==null||v==="")return"\u2014";var n=Number(v);if(isNaN(n))return v;return n.toLocaleString("sk-SK",{maximumFractionDigits:0})}
function fmtPct(v){if(v==null)return"\u2014";return Number(v).toFixed(1)+"%"}
function fmtEur(v){if(v==null)return"\u2014";var n=Number(v);if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+"M \u20ac";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+"k \u20ac";return fmt(n)+" \u20ac"}
function valClass(v){if(v==null)return"";return Number(v)>=0?"rg-positive":"rg-negative"}
function apiFetch(ep,params){var url=new URL(API_URL+ep);Object.entries(params||{}).forEach(function(kv){if(kv[1]!==""&&kv[1]!=null&&kv[1]!==undefined&&kv[1]!==false)url.searchParams.set(kv[0],kv[1])});return fetch(url.toString()).then(function(r){if(!r.ok)throw new Error("API error: "+r.status);return r.json()})}

function bindTooltips(){
var tip=document.getElementById("rg-tooltip");
if(!tip){tip=document.createElement("div");tip.id="rg-tooltip";tip.className="rg-tip";document.body.appendChild(tip)}
var els=container.querySelectorAll("[data-tip]");
els.forEach(function(el){
el.style.cursor="crosshair";
el.addEventListener("mouseenter",function(e){
var parts=el.getAttribute("data-tip").split(/ (.+)/);
tip.innerHTML=(parts.length>1?'<div class="rg-tip-label">'+parts[0]+'</div><div class="rg-tip-val">'+parts[1]+"</div>":'<div class="rg-tip-val">'+parts[0]+"</div>");
tip.classList.add("on")});
el.addEventListener("mousemove",function(e){
tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY-10)+"px"});
el.addEventListener("mouseleave",function(){tip.classList.remove("on")})})}

function fg(label,key,ph){return'<div class="rg-filter-group"><label>'+label+'</label><input type="number" data-filter="'+key+'" value="'+(f[key]||"")+'" placeholder="'+(ph||"")+'"></div>'}

var basic='<div class="rg-filters"><div class="rg-filter-group"><label>Rok</label><select data-filter="rok"><option value="2024"'+(f.rok==2024?" selected":"")+'>2024</option><option value="2023"'+(f.rok==2023?" selected":"")+'>2023</option><option value="2022"'+(f.rok==2022?" selected":"")+'>2022</option><option value="2021"'+(f.rok==2021?" selected":"")+'>2021</option><option value="2020"'+(f.rok==2020?" selected":"")+'>2020</option></select></div><div class="rg-filter-group"><label>Sektor (SK NACE)</label><input type="text" data-filter="sk_nace" value="'+f.sk_nace+'" placeholder="napr. 69200"></div><div class="rg-filter-group"><label>Mesto</label><input type="text" data-filter="mesto" value="'+f.mesto+'" placeholder="napr. Bratislava"></div>'+fgp("Tr\u017eby","trzby")+fg("Zisk od","vh_od","0")+fg("Zisk do","vh_do","\u221e")+fg("Zamestnanci od","zamestnanci_od","0")+fg("Zamestnanci do","zamestnanci_do","\u221e")+chk("len_ziskove","Len ziskov\u00e9")+'</div>';

var advSection="";
if(adv){
var secL=function(t){return'<div style="font-family:var(--rg-mono);font-size:.65rem;color:var(--rg-accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;opacity:.7">'+t+"</div>"};
advSection='<div style="border-top:1px solid var(--rg-border);padding-top:12px;margin-bottom:12px">'+secL("S\u00favaha \u2014 Akt\u00edva")+'<div class="rg-filters">'+fgp("Celk. majetok","majetok")+fgp("Neobe\u017en\u00fd maj.","neobezny")+fgp("Obe\u017en\u00fd maj.","obezny")+fgp("Poh\u013ead\u00e1vky","pohladavky")+fgp("Cash","cash")+'</div></div><div style="border-top:1px solid var(--rg-border);padding-top:12px;margin-bottom:12px">'+secL("S\u00favaha \u2014 Pas\u00edva")+'<div class="rg-filters">'+fgp("Vl. imanie","imanie")+fgp("Z\u00e1v\u00e4zky celkom","zavazky")+fgp("Bank. \u00favery","uvery")+'</div></div><div style="border-top:1px solid var(--rg-border);padding-top:12px;margin-bottom:12px">'+secL("V\u00fdkaz ziskov a str\u00e1t")+'<div class="rg-filters">'+fgp("Osobn\u00e9 n\u00e1klady","osobne")+fgp("Pridan\u00e1 hodnota","pridana")+fgp("Odpisy","odpisy")+fgp("VH hospod\u00e1rsky","vh_hosp")+'</div></div><div style="border-top:1px solid var(--rg-border);padding-top:12px;margin-bottom:12px">'+secL("Vypo\u010d\u00edtan\u00e9 metriky")+'<div class="rg-filters">'+fg("Mar\u017ea od (%)","marza_od","0")+fg("Mar\u017ea do (%)","marza_do","\u221e")+fg("EBITDA od","ebitda_od","0")+fg("EBITDA do","ebitda_do","\u221e")+fg("EV/EBITDA od","ev_ebitda_od","0")+fg("EV/EBITDA do","ev_ebitda_do","\u221e")+fg("Rast tr\u017eieb od (%)","rast_od","napr. 5")+fg("Rast tr\u017eieb do (%)","rast_do","\u221e")+fg("ROE od (%)","roe_od","0")+fg("ROE do (%)","roe_do","\u221e")+fg("Zadl\u017eenos\u0165 do (%)","zadlzenost_do","\u221e")+fg("Current ratio od","current_od","0")+chk("bez_flags","Bez red flags *")+'</div><div style="font-size:.6rem;color:var(--rg-muted);margin-top:8px;opacity:.6">* Red flags: z\u00e1porn\u00e9 imanie, klesaj\u00face tr\u017eby/zisk 2+ roky, negat\u00edvna EBITDA, predaj majetku >20% tr\u017eieb, rast\u00face z\u00e1v\u00e4zky</div></div>'}
var actions='<div style="padding:8px 0 0"><div class="rg-filter-actions"><button class="rg-btn rg-btn-primary" data-action="search">H\u013eada\u0165</button><button class="rg-btn rg-btn-ghost rg-btn-sm" data-action="reset">Reset</button></div></div>';
return basic+advBtn+advSection+actions}

function renderResults(){var r=state.results;if(!r||!r.data)return"";if(r.data.length===0)return'<div class="rg-empty">\u017diadne v\u00fdsledky pre zadan\u00e9 filtre.</div>';
var cols=[{key:"nazov",label:"Firma",sort:"nazov"},{key:"mesto",label:"Mesto"},{key:"trzby_celkom",label:"Tr\u017eby",sort:"trzby_celkom",f:fmtEur,c:"rg-num"},{key:"vh_po_zdaneni",label:"Zisk",sort:"vh_po_zdaneni",f:fmtEur,c:"rg-num",color:1},{key:"marza_cista",label:"Mar\u017ea",sort:"marza",f:fmtPct,c:"rg-num",color:1,fb:"marza_pct"},{key:"ebitda",label:"EBITDA",sort:"ebitda",f:fmtEur,c:"rg-num"},{key:"ev_ebitda",label:"EV/EBITDA",sort:"ev_ebitda",f:function(v){return v!=null?Number(v).toFixed(1)+"x":"\u2014"},c:"rg-num"},{key:"rast_trzby_yoy",label:"Rast",sort:"rast",f:fmtPct,c:"rg-num",color:1},{key:"odhad_zamestnancov",label:"Zam.",sort:"osobne_naklady",f:fmt,c:"rg-num"},{key:"_flags",label:"\u26a0",f:function(v,row){var fl=[];if(row.flag_zaporne_imanie)fl.push("ZI");if(row.flag_klesajuce_trzby)fl.push("KT");if(row.flag_ebitda_negativna)fl.push("NE");if(row.flag_klesajuci_zisk)fl.push("KZ");if(row.flag_rastuce_zavazky)fl.push("RZ");if(!fl.length)return"\u2014";var tips={"ZI":"Z\u00e1porn\u00e9 vlastn\u00e9 imanie","KT":"Klesaj\u00face tr\u017eby 2+ roky","NE":"Negat\u00edvna EBITDA","KZ":"Klesaj\u00faci zisk 2+ roky","RZ":"Rast\u00face z\u00e1v\u00e4zky"};var tt=fl.map(function(f){return f+": "+tips[f]}).join("\\n");return'<span style="color:var(--rg-red);font-size:.7rem;cursor:help" title="'+tt+'">'+fl.join(" ")+"</span>"},c:"rg-num",raw:1}];
var th="",tb="";
for(var i=0;i<cols.length;i++){var co=cols[i];th+='<th class="'+(co.sort===state.filters.sort?"rg-sorted":"")+'"'+(co.sort?' data-sort="'+co.sort+'"':"")+">"+co.label+(co.sort===state.filters.sort?(state.filters.sort_dir==="desc"?" \u2193":" \u2191"):"")+"</th>"}
for(var j=0;j<r.data.length;j++){var row=r.data[j];tb+='<tr data-ico="'+row.ico+'">';for(i=0;i<cols.length;i++){co=cols[i];var val=co.key==="_flags"?null:(row[co.key]!=null?row[co.key]:(co.fb?row[co.fb]:null));var disp=co.raw?(co.f?co.f(val,row):""):(co.f?co.f(val):(val||"\u2014"));var cc=co.color&&val!=null?valClass(val):"";tb+='<td class="'+(co.c||"")+" "+cc+'">'+disp+"</td>"}tb+="</tr>"}
return renderAggCharts(r.data)+'<div class="rg-toolbar"><span>'+r.total+' v\u00fdsledkov</span><button class="rg-btn rg-btn-ghost rg-btn-sm" data-action="export">\u2b07 Export CSV</button></div><div class="rg-table-wrap"><table class="rg-table"><thead><tr>'+th+'</tr></thead><tbody>'+tb+"</tbody></table></div>"+renderPagination()}

function renderAggCharts(data){
if(!data||data.length<1)return"";
var W=320,H=160,pad=40,padR=15,padT=20,padB=25;
var cW=W-pad-padR,cH=H-padT-padB;
var ac="#c8ff3e",red="#f87171",grn="#34d399",dim="#55585f",surf="#111316";

function mkSVG(title,body){return'<div style="background:'+surf+';border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px 12px;min-width:250px;flex:1"><div style="font-family:var(--rg-mono);font-size:9px;color:'+dim+';text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">'+title+'</div><svg viewBox="0 0 '+W+" "+H+'" width="100%" style="display:block">'+body+"</svg></div>"}

// ─── 1: Revenue distribution histogram ───
var trzby=[];for(var i=0;i<data.length;i++){var t=data[i].trzby_celkom;if(t!=null&&t>0)trzby.push(t)}
var c1="";
if(trzby.length>0){
trzby.sort(function(a,b){return a-b});
var mx=trzby[trzby.length-1];
var buckets,labels;
if(mx<=500000){buckets=[0,50000,100000,200000,500000];labels=["0-50k","50-100k","100-200k","200-500k"]}
else if(mx<=5000000){buckets=[0,100000,500000,1000000,2000000,5000000];labels=["0-100k","100-500k","500k-1M","1-2M","2-5M"]}
else{buckets=[0,500000,1000000,5000000,10000000,100000000];labels=["0-500k","500k-1M","1-5M","5-10M","10M+"]}
var counts=[];for(i=0;i<labels.length;i++)counts.push(0);
for(i=0;i<trzby.length;i++){for(var b=buckets.length-2;b>=0;b--){if(trzby[i]>=buckets[b]){if(b>=counts.length)b=counts.length-1;counts[b]++;break}}}
var maxC=Math.max.apply(null,counts);if(maxC===0)maxC=1;
var nb=counts.length,bw=Math.max((cW/nb)-6,12);
for(i=0;i<nb;i++){var barH=counts[i]/maxC*cH;var x=pad+i*(cW/nb)+3;var y=padT+cH-barH;
c1+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+barH+'" rx="2" fill="'+ac+'" opacity="0.3" data-tip="'+labels[i]+': '+counts[i]+' firiem"></rect>';
if(counts[i]>0)c1+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" fill="'+ac+'" font-family="monospace" font-size="9" font-weight="600">'+counts[i]+"</text>";
c1+='<text x="'+(x+bw/2)+'" y="'+(H-3)+'" text-anchor="middle" fill="'+dim+'" font-family="monospace" font-size="7">'+labels[i]+"</text>"}}

// ─── 2: Profitable vs Loss-making donut ───
var profit=0,loss=0;
for(i=0;i<data.length;i++){if(data[i].vh_po_zdaneni!=null){if(data[i].vh_po_zdaneni>=0)profit++;else loss++}}
var total=profit+loss;var c2="";
if(total>0){
var cx=W/2,cy=H/2+5,r=45;
var profAngle=profit/total*360;
var startRad=-Math.PI/2;
var endRad=startRad+profAngle*Math.PI/180;
var largeArc=profAngle>180?1:0;
if(profit===total){c2+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+grn+'" stroke-width="14" opacity="0.4"/>'}
else if(loss===total){c2+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+red+'" stroke-width="14" opacity="0.4"/>'}
else{
var x1=cx+r*Math.cos(startRad),y1=cy+r*Math.sin(startRad);
var x2=cx+r*Math.cos(endRad),y2=cy+r*Math.sin(endRad);
c2+='<path d="M'+x1+" "+y1+"A"+r+" "+r+" 0 "+largeArc+" 1 "+x2+" "+y2+'" fill="none" stroke="'+grn+'" stroke-width="14" opacity="0.4"/>';
var lossAngle=360-profAngle;var largeArc2=lossAngle>180?1:0;
var x3=cx+r*Math.cos(endRad),y3=cy+r*Math.sin(endRad);
c2+='<path d="M'+x3+" "+y3+"A"+r+" "+r+" 0 "+largeArc2+" 1 "+x1+" "+y1+'" fill="none" stroke="'+red+'" stroke-width="14" opacity="0.4"/>'}
c2+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="#eeeee9" font-family="monospace" font-size="18" font-weight="600">'+Math.round(profit/total*100)+'%</text>';
c2+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="'+dim+'" font-family="monospace" font-size="8">ziskov\u00fdch</text>';
c2+='<circle cx="'+(pad)+'" cy="'+(H-10)+'" r="4" fill="'+grn+'" opacity="0.4"/><text x="'+(pad+8)+'" y="'+(H-7)+'" fill="'+dim+'" font-family="monospace" font-size="8">Zisk ('+profit+')</text>';
c2+='<circle cx="'+(W/2)+'" cy="'+(H-10)+'" r="4" fill="'+red+'" opacity="0.4"/><text x="'+(W/2+8)+'" y="'+(H-7)+'" fill="'+dim+'" font-family="monospace" font-size="8">Strata ('+loss+')</text>'}

// ─── 3: Median stats summary ───
var marze=[],rasty=[],ebitdy=[];
for(i=0;i<data.length;i++){
var mc=data[i].marza_cista;if(mc!=null)marze.push(mc);
var rt=data[i].rast_trzby_yoy;if(rt!=null)rasty.push(rt);
var eb=data[i].ebitda;if(eb!=null)ebitdy.push(eb)}
function median(arr){if(!arr.length)return null;arr.sort(function(a,b){return a-b});var mid=Math.floor(arr.length/2);return arr.length%2?arr[mid]:(arr[mid-1]+arr[mid])/2}
var medMarza=median(marze),medRast=median(rasty),medEbitda=median(ebitdy);
var c3="";
var stats=[{l:"Medi\u00e1n mar\u017ea",v:medMarza!=null?medMarza.toFixed(1)+"%":"\u2014",c:medMarza!=null&&medMarza>=0?grn:red},{l:"Medi\u00e1n rast tr\u017eieb",v:medRast!=null?medRast.toFixed(1)+"%":"\u2014",c:medRast!=null&&medRast>=0?grn:red},{l:"Medi\u00e1n EBITDA",v:medEbitda!=null?(Math.abs(medEbitda)>=1e6?(medEbitda/1e6).toFixed(1)+"M":(medEbitda/1e3).toFixed(0)+"k"):"\u2014",c:medEbitda!=null&&medEbitda>=0?grn:red},{l:"Firiem",v:""+data.length,c:"#eeeee9"}];
for(i=0;i<stats.length;i++){
var sy=padT+i*30;
c3+='<text x="'+pad+'" y="'+(sy+10)+'" fill="'+dim+'" font-family="monospace" font-size="9">'+stats[i].l+'</text>';
c3+='<text x="'+(W-padR)+'" y="'+(sy+10)+'" text-anchor="end" fill="'+stats[i].c+'" font-family="monospace" font-size="13" font-weight="600">'+stats[i].v+"</text>"}

var html='<div style="display:flex;gap:12px;margin:0 0 20px;flex-wrap:wrap">';
if(c1)html+=mkSVG("Distrib\u00facia tr\u017eieb",c1);
if(c2)html+=mkSVG("Ziskov\u00e9 vs Stratov\u00e9",c2);
html+=mkSVG("S\u00fahrn v\u00fdsledkov",c3);

for(i=0;i<n;i++){var y0=yPos(0,a1),yt=yPos(trzby[i],a1);var barH=Math.abs(y0-yt);var barY=Math.min(y0,yt);c1+='<rect x="'+xBar(i)+'" y="'+barY+'" width="'+bw+'" height="'+barH+'" rx="2" fill="'+ac+'" opacity="0.25" data-tip="'+fin[i].rok+' Tr\u017eby: '+fmtEur(trzby[i])+'"></rect>';c1+='<text x="'+(xBar(i)+bw/2)+'" y="'+(H-4)+'" text-anchor="middle" fill="'+dim+'" font-family="monospace" font-size="8">'+fin[i].rok+"</text>"}

for(i=0;i<n;i++){if(zisk[i]!=null){var cx=xBar(i)+bw/2,cy=yPos(zisk[i],a1),col=zisk[i]>=0?grn:red;c1+='<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="'+col+'" opacity="0" data-tip="'+fin[i].rok+' Zisk: '+fmtEur(zisk[i])+'"></circle><circle cx="'+cx+'" cy="'+cy+'" r="3" fill="'+col+'" pointer-events="none"/>'}}

// ─── CHART 2: Margin trend ───

// Zero line
if(a2.min<0){var yz=yPos(0,a2);c2+='<line x1="'+pad+'" y1="'+yz+'" x2="'+(W-padR)+'" y2="'+yz+'" stroke="rgba(255,255,255,.12)" stroke-width="0.5" stroke-dasharray="3,3"/>'}
// EBITDA margin line

pts="";started=false;for(i=0;i<n;i++){if(mCista[i]!=null){lx=xBar(i)+bw/2;ly=yPos(mCista[i],a2);pts+=(started?"L":"M")+lx+","+ly;started=true}}

if(eq[i]>=0){c3+='<rect x="'+xBar(i)+'" y="'+(baseY-eqH-zvH)+'" width="'+bw+'" height="'+zvH+'" rx="2" fill="'+red+'" opacity="0.35" data-tip="'+fin[i].rok+' Z\u00e1v\u00e4zky: '+fmtEur(zav[i])+'"></rect>';

function doSearch(offset){offset=offset||0;state.loading=true;state.error=null;render();var f=state.filters;
apiFetch("/api/screening",{rok:f.rok,sk_nace:f.sk_nace,mesto:f.mesto,trzby_od:f.trzby_od,trzby_do:f.trzby_do,vh_od:f.vh_od,vh_do:f.vh_do,zamestnanci_od:f.zamestnanci_od,zamestnanci_do:f.zamestnanci_do,len_ziskove:f.len_ziskove,majetok_od:f.majetok_od,majetok_do:f.majetok_do,imanie_od:f.imanie_od,imanie_do:f.imanie_do,osobne_od:f.osobne_od,osobne_do:f.osobne_do,ebitda_od:f.ebitda_od,ebitda_do:f.ebitda_do,ev_ebitda_od:f.ev_ebitda_od,ev_ebitda_do:f.ev_ebitda_do,rast_od:f.rast_od,rast_do:f.rast_do,marza_od:f.marza_od,marza_do:f.marza_do,roe_od:f.roe_od,roe_do:f.roe_do,zadlzenost_do:f.zadlzenost_do,current_od:f.current_od,bez_flags:f.bez_flags,neobezny_od:f.neobezny_od,neobezny_do:f.neobezny_do,obezny_od:f.obezny_od,obezny_do:f.obezny_do,pohladavky_od:f.pohladavky_od,pohladavky_do:f.pohladavky_do,cash_od:f.cash_od,cash_do:f.cash_do,zavazky_od:f.zavazky_od,zavazky_do:f.zavazky_do,uvery_od:f.uvery_od,uvery_do:f.uvery_do,pridana_od:f.pridana_od,pridana_do:f.pridana_do,odpisy_od:f.odpisy_od,odpisy_do:f.odpisy_do,vh_hosp_od:f.vh_hosp_od,vh_hosp_do:f.vh_hosp_do,sort:f.sort,sort_dir:f.sort_dir,limit:50,offset:offset}).then(function(d){state.results=d;state.loading=false;render()}).catch(function(e){state.error="Chyba: "+e.message+". Je API server spusten\u00fd?";state.loading=false;render()})}

function showDetail(ico){state.view="detail";state.detailLoading=true;state.detail=null;history.pushState({scrDetail:ico},"","#/screener/"+ico);render();
apiFetch("/api/firma/"+ico).then(function(d){state.detail=d;state.detailLoading=false;render()}).catch(function(e){state.error="Chyba: "+e.message;state.view="list";state.detailLoading=false;render()})}

function doExport(){var f=state.filters,p=new URLSearchParams;p.set("rok",f.rok);if(f.sk_nace)p.set("sk_nace",f.sk_nace);if(f.trzby_od)p.set("trzby_od",f.trzby_od);if(f.trzby_do)p.set("trzby_do",f.trzby_do);if(f.len_ziskove)p.set("len_ziskove","true");window.open(API_URL+"/api/export?"+p.toString())}

function loadInitialData(){apiFetch("/api/stats").then(function(d){state.stats=d;render()}).catch(function(e){state.error="Ned\u00e1 sa pripoji\u0165 k API.";render()})}

return{
set API_URL(u){API_URL=u.replace(/\/$/,"")},
get API_URL(){return API_URL},
reset:function(){state.view="list";state.detail=null;state.detailLoading=false;state.error=null},
_getState:function(){return state},
_showDetail:function(ico){showDetail(ico)},
mount:function(sel){container=document.querySelector(sel);if(!container){console.error("RentgenScreener: "+sel+" nen\u00e1jden\u00fd");return}if(!CSS_INJECTED){var st=document.createElement("style");st.id="rg-styles";st.textContent=STYLES;document.head.appendChild(st);CSS_INJECTED=true}loadInitialData()},
unmount:function(){if(container)container.innerHTML="";container=null}
}
})();
</script>
</body>
</html>
